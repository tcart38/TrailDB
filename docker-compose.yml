services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/traildb.sqlite
      - NODE_ENV=production
    volumes:
      - ${TRAILDB_DATA_PATH:-./data}:/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
