services:
  backend:
    image: ghcr.io/tcart38/traildb-backend:latest
    restart: unless-stopped
    environment:
      - DB_PATH=/data/traildb.sqlite
      - NODE_ENV=production
    volumes:
      - ${TRAILDB_DATA_PATH:-./data}:/data

  frontend:
    image: ghcr.io/tcart38/traildb-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
